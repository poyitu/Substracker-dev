name = "substracker-dev"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "subscription-manager"

[env.staging]
name = "subscription-manager-staging"

[[kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "a8095d5a6b58446abb28a5f0d90850c5"
preview_id = "a8095d5a6b58446abb28a5f0d90850c5"

# 静态资源：托管 public/ 目录下的 JS/CSS/HTML 给浏览器
# 使用方式：浏览器访问 /js/lib/api-client.js 等同于 public/js/lib/api-client.js
# 不命中静态资源的请求由 Worker fetch handler 处理（默认行为）
[assets]
directory = "./public"
binding = "ASSETS"

# 定时任务配置 - 每小时检查一次（UTC）
[triggers]
crons = ["0 * * * *"]

# 环境变量（可选，也可以在 Cloudflare Dashboard 中设置）
[vars]
ENVIRONMENT = "production"
