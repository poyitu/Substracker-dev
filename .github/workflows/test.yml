name: Test

on:
  push:
    branches: ['refactor/**']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (JSDoc + // @ts-check)
        run: npm run lint

      - name: Run unit tests
        run: npm test
